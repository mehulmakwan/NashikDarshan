<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nashik Darshan Yatra Places</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=Noto+Sans+Gujarati:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="places-page">
  <header class="places-header fade-up">
    <div>
      <p class="places-header__eyebrow" data-i18n="placesEyebrow">Explore divine and cultural destinations</p>
      <h1 class="places-header__title" data-i18n="placesTitle">Sacred Places in Nashik</h1>
      <p class="places-header__subtitle" data-i18n="placesSubtitle">
        Tap a destination to read a short history or open directions in Google Maps.
      </p>
    </div>

    <a href="index.html" class="btn btn--secondary" data-i18n="changeLanguage">Change Language</a>
  </header>

  <main class="places-content">
    <section>
      <div id="placesGrid" class="places-grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer" data-i18n="footerText">B.A.P.S Swaminarayan Mandir, Nasik</footer>

  <div id="placeModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__backdrop" data-close-modal="true"></div>
    <div class="modal__dialog">
      <button id="modalClose" class="modal__close" type="button" aria-label="Close modal">&times;</button>
      <div id="modalContent" class="modal__content"></div>
    </div>
  </div>

  <script src="content-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
